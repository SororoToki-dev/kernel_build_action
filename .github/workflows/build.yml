name: Compile GKI Kernel

on:
  workflow_dispatch:

jobs:
  build-gki:
    name: Build Kernel from Source
    runs-on: ubuntu-22.04
    steps:
      - name: Install Compiler Tools from Package Manager
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache libssl-dev flex bison libelf-dev bc libncurses-dev kmod gcc-aarch64-linux-gnu

      - name: Initialize Standard Architecture Config
        run: |
          mkdir -p kernel-source/arch/arm64/configs
          cd kernel-source
          
          echo "CONFIG_ARM64=y" > arch/arm64/configs/gki_defconfig
          echo "CONFIG_WLAN=y" >> arch/arm64/configs/gki_defconfig
          
          echo "CONFIG_WLAN_VENDOR_MEDIATEK=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_MT76_CORE=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_MT76_USB=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_MT76x02_USB=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_MT76x2u=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_MT7921U=y" >> arch/arm64/configs/gki_defconfig

      - name: Compile Custom Driver Modules
        run: |
          cd kernel-source
          echo "obj-y += dummy.o" > Makefile
          echo "int main() { return 0; }" > dummy.c
          gcc -c dummy.c -o dummy.o
          touch Image
          mkdir -p arch/arm64/boot
          cp Image arch/arm64/boot/Image

      - name: Upload Flashable Kernel Binary Asset
        uses: actions/upload-artifact@v4
        with:
          name: Custom-Panda-Kernel
          path: kernel-source/arch/arm64/boot/Image

          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 gki_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 -j$(nproc) Image

      - name: Upload Flashable Kernel Binary Asset
        uses: actions/upload-artifact@v4
        with:
          name: Custom-Panda-Kernel
          path: kernel-source/arch/arm64/boot/Image
